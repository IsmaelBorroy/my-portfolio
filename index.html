<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ismael Borroy</title>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>

    <!-- Top-left controls -->
    <div class="top-controls">
      <button class="lang-btn" id="lang-toggle" aria-label="Switch language">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 8l6 6"/>
          <path d="M4 14l6-6 2-3"/>
          <path d="M2 5h12"/>
          <path d="M7 2h1"/>
          <path d="M22 22l-5-10-5 10"/>
          <path d="M14 18h6"/>
        </svg>
        <span data-i18n="lang_label">ES</span>
      </button>
      <button class="theme-btn" id="theme-toggle" aria-label="Switch theme">
        <!-- Sun icon (shown in dark mode) -->
        <svg class="theme-btn__sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg class="theme-btn__moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <!-- Background name — visible through transparent canvas -->
    <div class="hero-bg" aria-hidden="true">
      <p class="hero-tagline" data-i18n="tagline">Software Developer</p>
      <h1 class="hero-name" data-i18n="name">Ismael Borroy</h1>
    </div>

    <!-- Three.js canvas mounts here -->
    <div id="canvas-container"></div>

    <!-- Mouse trail canvas -->
    <canvas id="trail-canvas" aria-hidden="true"></canvas>

    <!-- Enter hint -->
    <p class="enter-hint" id="enter-hint" data-i18n="hint">Click the door to enter</p>

    <!-- White flash overlay for page transition -->
    <div class="flash-overlay" id="flash-overlay"></div>
    <div class="lang-wipe" id="lang-wipe"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
